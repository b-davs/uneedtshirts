name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build launcher exe
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "NewOrderLauncher" `
            --icon "applogo.ico" `
            --add-data "config.example.json;." `
            --hidden-import "win32com" `
            --hidden-import "win32com.client" `
            --hidden-import "tkcalendar" `
            main.py

      - name: Build watcher exe
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "BizactivityWatcher" `
            --icon "applogo.ico" `
            --add-data "config.example.json;." `
            --hidden-import "win32com" `
            --hidden-import "win32com.client" `
            --hidden-import "watchdog" `
            --hidden-import "watchdog.observers" `
            --hidden-import "watchdog.events" `
            watcher.py

      - name: Bundle release files
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          Set-Content -Path dist/version.txt -Value $version -NoNewline
          Copy-Item config.example.json dist/
          Copy-Item applogo.ico dist/
          Copy-Item install.ps1 dist/
          Copy-Item create_shortcut.ps1 dist/
          Copy-Item update.ps1 dist/
          Compress-Archive -Path dist/* -DestinationPath NewOrderLauncher.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: NewOrderLauncher.zip
          generate_release_notes: true
